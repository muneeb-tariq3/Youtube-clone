<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎁</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  color:white;
  overflow:hidden;
  text-align:center;
}

.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* Start Button */
.btn{
  padding:15px 35px;
  border:none;
  border-radius:30px;
  background:#ff4da6;
  color:white;
  font-size:18px;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{50%{transform:scale(1.1);}}

/* Hidden content */
.hidden{display:none;}

/* Messages */
.message{
  font-size:22px;
  margin:15px;
  opacity:0;
  animation:fadeIn 2s forwards;
}
@keyframes fadeIn{to{opacity:1;}}

/* Hearts */
.heart{
  position:absolute;
  font-size:20px;
  animation:float 6s linear infinite;
}
@keyframes float{0%{transform:translateY(100vh);}100%{transform:translateY(-10vh);}}

/* Confetti */
.confetti{
  position:absolute;
  width:8px;
  height:8px;
  background:yellow;
  animation:fall 3s linear infinite;
}
@keyframes fall{to{transform:translateY(100vh);}}

/* Sparkles */
.sparkle{
  position:absolute;
  animation:spark 2s linear infinite;
}
@keyframes spark{50%{opacity:1;transform:scale(1.2);}}

/* Final Text Glow */
.final{
  font-size:40px;
  margin-top:20px;
  animation:glow 2s infinite alternate;
}
@keyframes glow{from{text-shadow:0 0 10px pink;}to{text-shadow:0 0 30px purple;}}

/* Buttons */
.actions button{
  margin:10px;
  padding:12px 22px;
  border:none;
  border-radius:20px;
  background:#ff66cc;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.actions button:hover{transform:scale(1.2) rotate(3deg);}

/* Gift Box */
.gift{
  margin-top:20px;
  font-size:50px;
  cursor:pointer;
  animation:bounce 1.5s infinite;
}
@keyframes bounce{50%{transform:translateY(-10px);}}

/* Fireworks */
.firework{
  position:absolute;
  font-size:20px;
  animation:explode 1s ease-out forwards;
}
@keyframes explode{0%{transform:scale(0);}100%{transform:scale(3);opacity:0;}}
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bgMusic" loop>
  <source src="https://orangefreesounds.com/wp-content/uploads/2023/02/Piano-instrumental-song.mp3" type="audio/mpeg">
</audio>

<!-- Start Screen -->
<div class="container" id="start">
  <button class="btn" onclick="startSurprise()">Tap for Cute Surprise 🎁</button>
</div>

<!-- Main Content -->
<div class="container hidden" id="main">
  <div class="message">Hey... Happy Birthday 🎉</div>
  <div class="message">Wishing you happiness, smiles & good vibes ✨</div>

  <div class="actions">
    <button onclick="popup('Stay happy always 😊')">💖</button>
    <button onclick="popup('Keep shining ✨')">🎈</button>
    <button onclick="popup('Enjoy your special day 🎂')">🌟</button>
  </div>

  <!-- Gift Box -->
  <div class="gift" onclick="openGift()">🎁</div>

  <div class="final">Happy Birthday 🎉</div>
</div>

<script>
function startSurprise(){
  document.getElementById("start").style.display="none";
  document.getElementById("main").classList.remove("hidden");

  // Play music
  document.getElementById("bgMusic").play();

  // Hearts
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },300);

  // Confetti
  setInterval(()=>{
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  },200);

  // Sparkles
  setInterval(()=>{
    let s=document.createElement("div");
    s.className="sparkle";
    s.innerHTML="✨";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2000);
  },400);

  // Fun daily alert reminders (safe, cute)
  setTimeout(()=>{alert("Hope you are having a fun day today! 😊");}, 5000);
  setTimeout(()=>{alert("Keep smiling 😄✨");}, 10000);
  setTimeout(()=>{alert("Enjoy your special day 🎉");}, 15000);
}

// Popup buttons
function popup(text){ alert(text); }

// Gift + Fireworks
function openGift(){
  alert("A small surprise just for you 🎁✨");
  for(let i=0;i<15;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.innerHTML="🎆";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}
</script>

</body>
</html>
